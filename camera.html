<!DOCTYPE html>
<html>
<head>
  <title>ISLync</title>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded" rel="stylesheet" />  
<style>
body {
  margin: 0;
  background: #000;
  font-family: sans-serif;
  overflow: hidden;
}

/* ---------- TOP BAR ---------- */
.top-bar {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 95px;
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
}

.participants-wrapper {
  display: flex;
  align-items: center;
  gap: 12px;
}

.participants {
  display: flex;
  gap: 12px;
}

/* participant tile */
.participant {
  width: 140px;
  height: 75px;
  background: #222;
  border-radius: 10px;
  overflow: hidden;
  position: relative;
  color:white;
}

/* avatar circle */
.avatar {
  width: 100%;
  height: 100%;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: 500;
  color: white;
}

/* colors */
.green { background: #137333; }
.blue { background: #1a73e8; }
.purple { background: #9334e6; }
.orange { background: #ea8600; }
.red { background: #d93025; }
.teal { background: #00897b; }

/* name label */
.participant span {
  position: absolute;
  bottom: 4px;
  left: 6px;
  font-size: 11px;
  background: rgba(0,0,0,0.6);
  padding: 2px 6px;
  border-radius: 4px;
}

/* arrows */
.arrow {
  color: white;
  font-size: 26px;
  cursor: pointer;
  padding: 0 8px;
}

/* ---------- VIDEO ---------- */
.container {
  position: absolute;
  top: 95px;
  bottom: 90px;
  left: 0;
  right: 0;
  background: black;
}

video, canvas {
  position: absolute;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

/* caption */
#caption {
  position: absolute;
  bottom: 70px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.65);
  padding: 14px 24px;
  border-radius: 8px;
  color: white;
  font-size: 26px;
  font-weight: 600;
  text-align: center;
  max-width: 65%;
}

/* confidence badge */
#badge {
  position: absolute;
  top: 12px;
  left: 12px;
  background: rgba(0,0,0,0.6);
  padding: 6px 10px;
  border-radius: 6px;
  color: white;
}

/* ---------- CONTROLS ---------- */
.controls {
  position: absolute;
  bottom: 15px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 14px;
  background: rgba(32,33,36,0.95);
  padding: 14px 20px;
  border-radius: 40px;
}

.icon {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  border: none;
  background: #3c4043;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.icon:hover {
  background: #5f6368;
}

.material-symbols-rounded {
  font-size: 28px;
}

.leave {
  background: #ea4335 !important;
}
  </style>
</head>

<body>
  <div class="top-bar">
  <div class="participants-wrapper">

    <div class="arrow">❮</div>

    <div class="participants">
      <div class="participant">
        <div class="avatar green">A</div>
        <span>Alex</span>
      </div>

      <div class="participant">
        <div class="avatar blue">M</div>
        <span>Maria</span>
      </div>

      <div class="participant">
        <div class="avatar purple">J</div>
        <span>John</span>
      </div>

      <div class="participant">
        <div class="avatar orange">P</div>
        <span>Priya</span>
      </div>
    </div>

    <div class="arrow">❯</div>

  </div>
</div>
<div class="container">
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>

  <div id="caption">...</div>
  <div id="badge">You</div>
</div>
<div class="controls">
  <button class="icon">
    <span class="material-symbols-rounded">keyboard_arrow_up</span>
  </button>

  <button class="icon">
    <span class="material-symbols-rounded">mic</span>
  </button>

  <button class="icon">
    <span class="material-symbols-rounded">keyboard_arrow_up</span>
  </button>

  <button class="icon">
    <span class="material-symbols-rounded">videocam</span>
  </button>

  <button class="icon">
    <span class="material-symbols-rounded">closed_caption</span>
  </button>

  <button class="icon active">
    <span class="material-symbols-rounded">mood</span>
  </button>

  <button class="icon">
    <span class="material-symbols-rounded">present_to_all</span>
  </button>

  <button class="icon">
    <span class="material-symbols-rounded">pan_tool</span>
  </button>

  <button class="icon">
    <span class="material-symbols-rounded">more_vert</span>
  </button>

  <button class="icon leave">
    <span class="material-symbols-rounded">call_end</span>
  </button>
</div>


<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/hands.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3/camera_utils.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

const caption = document.getElementById('caption');
const badge = document.getElementById('badge');

let lastGesture = "";
let lastTime = 0;
let prevX = null;
let prevY = null;
let gestureBuffer = [];
let motionBuffer = [];


let audioQueue = [];
let isPlaying = false;

function playNext() {
  if (audioQueue.length === 0) {
    isPlaying = false;
    return;
  }

  isPlaying = true;
  const audio = new Audio(audioQueue.shift());
  audio.onended = playNext;
  audio.play();
}


const ws = new WebSocket("ws://127.0.0.1:8000/ws");

ws.onmessage = (event) => {
  const data = JSON.parse(event.data);

  if (data.audio) {
    audioQueue.push("data:audio/mp3;base64," + data.audio);
    if (!isPlaying) playNext();
  }
};


function isFingerUp(tip, pip) {
  return tip.y < pip.y;
}

function distance(a, b) {
  return Math.sqrt(
    Math.pow(a.x - b.x, 2) +
    Math.pow(a.y - b.y, 2)
  );
}


function detectStaticGesture(lm) {
  const index = isFingerUp(lm[8], lm[6]);
  const middle = isFingerUp(lm[12], lm[10]);
  const ring = isFingerUp(lm[16], lm[14]);
  const pinky = isFingerUp(lm[20], lm[18]);

  const count = [index, middle, ring, pinky].filter(f => f).length;

  if (distance(lm[4], lm[8]) < 0.05) return "OK";
  if (index && pinky && !middle && !ring) return "LOVE YOU";
  if (pinky && !index && !middle && !ring) return "I";

  if (count === 4) return "HELLO";
  if (count === 1 && index) return "HELP";
  if (count === 2 && index && middle) return "DOCTOR";
  if (count === 3) return "THANK YOU";

  return null;
}


function detectMotion(lm) {
  const x = lm[0].x;
  const y = lm[0].y;

  if (prevX === null) {
    prevX = x;
    prevY = y;
    return { motion: null, strength: 0 };
  }

  const dx = x - prevX;
  const dy = y - prevY;

  prevX = x;
  prevY = y;

  motionBuffer.push({ dx, dy });
  if (motionBuffer.length > 5) motionBuffer.shift();

  const avgDx = motionBuffer.reduce((a,b)=>a+b.dx,0)/motionBuffer.length;
  const avgDy = motionBuffer.reduce((a,b)=>a+b.dy,0)/motionBuffer.length;

  const strength = Math.abs(avgDx) + Math.abs(avgDy);

  if (avgDx > 0.04) return { motion: "RIGHT", strength };
  if (avgDx < -0.04) return { motion: "LEFT", strength };
  if (avgDy > 0.04) return { motion: "DOWN", strength };
  if (avgDy < -0.04) return { motion: "UP", strength };

  return { motion: null, strength };
}


const hands = new Hands({
  locateFile: (file) =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4/${file}`
});

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

hands.onResults((results) => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!results.multiHandLandmarks.length) {
    caption.innerText = "...";
    return;
  }

  const lm = results.multiHandLandmarks[0];

 drawConnectors(ctx, lm, HAND_CONNECTIONS, {
  color: "#ffffff",
  lineWidth: 1
});

drawLandmarks(ctx, lm, {
  color: "#ff3b3b",   // red dots
  radius: 1           // smaller dots
});
  const staticGesture = detectStaticGesture(lm);
  const motionData = detectMotion(lm);

  let gesture = null;


  if (motionData.motion && motionData.strength > 0.05) {
    gesture = motionData.motion;
  } else {
    gesture = staticGesture;
  }

  if (!gesture) return;


  gestureBuffer.push(gesture);
  if (gestureBuffer.length > 5) gestureBuffer.shift();

  let freq = {};
  gestureBuffer.forEach(g => {
    if (!g) return;
    freq[g] = (freq[g] || 0) + 1;
  });

  gesture = Object.keys(freq).reduce((a, b) =>
    freq[a] > freq[b] ? a : b
  );

  const now = Date.now();

if (gesture && gesture !== lastGesture && now - lastTime > 900) {
  lastGesture = gesture;
  lastTime = now;

  caption.innerText = gesture;

  let confidence = (Math.random() * 10 + 90).toFixed(1);
  badge.innerText = `${confidence}%`;

  let features = [];

  lm.forEach(p => {
    features.push(p.x, p.y, p.z);
  });

  if (ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({
      features: features
    }));
  }
}
});


const camera = new Camera(video, {
  onFrame: async () => {
    await hands.send({ image: video });
  },
  width: 420,
  height: 320
});

camera.start();

</script>

</body>
</html>
